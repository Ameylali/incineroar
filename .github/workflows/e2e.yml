name: E2E Tests (Preview)

on:
  repository_dispatch:
    types:
    - 'vercel.deployment.success'

jobs:
  e2e:
    if: github.event.client_payload.environment == 'preview'
    runs-on: ubuntu-latest
    
    steps:
    - name: Set status check as pending
      uses: actions/github-script@v7
      with:
        script: |
          await github.rest.repos.createCommitStatus({
            owner: context.repo.owner,
            repo: context.repo.repo,
            sha: '${{ github.event.client_payload.git.sha }}',
            state: 'pending',
            context: 'E2E Tests (Preview)',
            description: 'Running E2E tests for preview deployment',
            target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
          });

    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.client_payload.git.sha }}
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: "latest"
    
    - name: Install Python dependencies
      working-directory: ./e2e
      run: uv sync

    - name: Install Playwrigth
      working-directory: ./e2e
      run:  uv run playwright install

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.19.5
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Create dummy .env file
      run: touch .env

    - name: Run seed script
      env:
        NEXT_PUBLIC_APP_URL: ${{ github.event.client_payload.url }}
        NEXT_PUBLIC_ENVIRONMENT: qa
        MONGODB_URI: ${{ secrets.QA_MONGODB_URI }}
        JWT_PRIVATE_KEY: ${{ secrets.JWT_PRIVATE_KEY }}
        JWT_PUBLIC_KEY: ${{ secrets.JWT_PUBLIC_KEY }}
        BASE_USER_PASSWORDS_MAP: ${{ secrets.BASE_USER_PASSWORDS_MAP }}
      run: npm run seed
    
    - name: Run e2e tests
      env:
        NEXT_PUBLIC_APP_URL: ${{ github.event.client_payload.url }}
        VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        NEXT_PUBLIC_ENVIRONMENT: qa
        BASE_USER_PASSWORDS_MAP: ${{ secrets.BASE_USER_PASSWORDS_MAP }}
        MONGODB_URI: ${{ secrets.QA_MONGODB_URI }}
        JWT_PRIVATE_KEY: ${{ secrets.JWT_PRIVATE_KEY }}
        JWT_PUBLIC_KEY: ${{ secrets.JWT_PUBLIC_KEY }}
      run: npm run test:e2e

    - name: Set status check as success
      if: success()
      uses: actions/github-script@v7
      with:
        script: |
          await github.rest.repos.createCommitStatus({
            owner: context.repo.owner,
            repo: context.repo.repo,
            sha: '${{ github.event.client_payload.git.sha }}',
            state: 'success',
            context: 'E2E Tests (Preview)',
            description: 'E2E tests passed for preview deployment',
            target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
          });

    - name: Set status check as failure
      if: failure()
      uses: actions/github-script@v7
      with:
        script: |
          await github.rest.repos.createCommitStatus({
            owner: context.repo.owner,
            repo: context.repo.repo,
            sha: '${{ github.event.client_payload.git.sha }}',
            state: 'failure',
            context: 'E2E Tests (Preview)',
            description: 'E2E tests failed for preview deployment',
            target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
          });
